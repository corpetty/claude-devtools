# =============================================================================
# claude-devtools — Docker Compose
#
# Quick start:
#   docker compose up
#
# Then open http://localhost:3456 in your browser.
#
# Security note:
#   The standalone server has zero outbound network calls — no telemetry,
#   no analytics, no auto-updater. For maximum isolation, uncomment
#   network_mode below.
# =============================================================================

services:
  claude-devtools:
    build: .
    network_mode: host
    runtime: nvidia
    volumes:
      - ${CLAUDE_DIR:-~/.claude}:/data/.claude:ro
      # Mount the full home dir read-only so session path references resolve correctly.
      # Sessions encode paths like /home/petty/.openclaw/workspace — without this,
      # git branch detection, mentioned files, and context panels break.
      - /home/petty:/home/petty:ro
    environment:
      - NODE_ENV=production
      - CLAUDE_ROOT=/data/.claude
      - HOST=0.0.0.0
      - PORT=3456
      - OPENCLAW_HOME=/home/petty/.openclaw
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=utility
    restart: unless-stopped
    # Uncomment for maximum network isolation (no outbound connections):
    # network_mode: "none"
